name: build-and-test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PipelineEnvironment: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tests
        run: dotnet restore test/Soenneker.Shadcn.Ui.Runner.Tests/Soenneker.Shadcn.Ui.Runner.Tests.csproj --verbosity minimal

      - name: Build tests
        run: dotnet build test/Soenneker.Shadcn.Ui.Runner.Tests/Soenneker.Shadcn.Ui.Runner.Tests.csproj --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test --project test/Soenneker.Shadcn.Ui.Runner.Tests/Soenneker.Shadcn.Ui.Runner.Tests.csproj --configuration Release --no-build --no-restore --verbosity minimal

      - name: Pack
        run: dotnet pack src/Soenneker.Shadcn.Ui.Runner/Soenneker.Shadcn.Ui.Runner.csproj --configuration Release --no-build --no-restore --output . --verbosity minimal
